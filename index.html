<!DOCTYPE html>

<head>

<title>White Softwares</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, Helvetica, sans-serif;
}

body{
background:white;
color:#0a0a0a;
}

/* HEADER */

header{
background:#4169E1;
color:white;
padding:20px;
text-align:center;
font-size:28px;
font-weight:bold;
}

/* MENU */

nav{
display:flex;
justify-content:center;
gap:30px;
background:#2e52c2;
padding:10px;
flex-wrap:wrap;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
}

/* CONTAINER */

.container{
max-width:1100px;
margin:auto;
padding:40px 20px;
}

/* TITULO */

.title{
text-align:center;
margin-bottom:40px;
}

.title h1{
font-size:36px;
color:#4169E1;
}

/* CARDS */

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}

/* CARD */

.card{
border:2px solid #4169E1;
padding:25px;
border-radius:10px;
text-align:center;
background:white;
transition:0.2s;
}

.card:hover{
transform:scale(1.05);
}

/* BOTÃO */

.btn{
display:inline-block;
margin-top:15px;
background:#4169E1;
color:white;
padding:12px 20px;
border-radius:6px;
text-decoration:none;
font-weight:bold;
}

.btn:hover{
background:#2e52c2;
}

/* FOOTER */

footer{
margin-top:40px;
background:#4169E1;
color:white;
text-align:center;
padding:15px;
}

/* MOBILE */

@media(max-width:600px){

header{
font-size:22px;
}

.title h1{
font-size:28px;
}

}

</style>
</head>

<body>
